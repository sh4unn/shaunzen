<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8a6a20">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Commonplace</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=New+Rocker&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f5;
    --surface: #e4ecee;
    --surface2: #dde7ea;
    --border: #c0ced2;
    --slate: #bfcbce;
    --ink: #1a2628;
    --muted: #4a6068;
    --faint: #8fa0a5;
    --accent: #2a5a6a;
    --accent-light: #3a7a8c;
    --accent-faint: #e0ecf0;
    --warm: #c45e2a;
    --gold: #8a6a20;
    --gold-light: #aa8a30;
    --gold-faint: #f5f0e0;
    --green: #3a6a2a;
    --red: #7a2020;
    --purple: #5a3a7a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'Spectral',serif; min-height:100vh; padding-bottom:5rem; }

  .home-btn { position:fixed; top:1rem; left:1rem; z-index:100; background:var(--accent); color:white; text-decoration:none; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; padding:0.5rem 0.9rem; border-radius:2px; transition:background 0.2s; }
  .home-btn:hover { background:var(--accent-light); }

  .header { background:var(--gold); color:white; padding:2.5rem 2rem 2rem; text-align:center; position:relative; overflow:hidden; }
  .header::before { content:'📖'; position:absolute; right:-1rem; top:-1rem; font-size:9rem; opacity:0.08; pointer-events:none; }
  .header-label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:0.6rem; }
  .header h1 { font-family:'New Rocker',cursive; font-size:clamp(2rem,6vw,3rem); font-weight:400; letter-spacing:0.02em; margin-bottom:0.3rem; }
  .header-sub { font-size:0.85rem; color:rgba(255,255,255,0.55); font-style:italic; }

  .tabs { background:rgba(0,0,0,0.2); display:flex; }
  .tab { flex:1; padding:0.75rem; font-family:'IBM Plex Mono',monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.45); cursor:pointer; text-align:center; border-bottom:2px solid transparent; transition:color 0.2s,border-color 0.2s; }
  .tab.active { color:white; border-bottom-color:white; }
  .tab:hover { color:rgba(255,255,255,0.8); }

  main { max-width:760px; margin:0 auto; padding:2rem 1.5rem; }
  .panel { display:none; } .panel.active { display:block; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.5rem; margin-bottom:1.25rem; }
  .card-title { font-family:'Spectral',serif; font-size:1rem; color:var(--gold); margin-bottom:1rem; }
  .field { margin-bottom:0.85rem; }
  .field label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); display:block; margin-bottom:0.4rem; }
  .field input, .field select { width:100%; background:white; border:1px solid var(--border); border-radius:4px; padding:0.6rem 0.85rem; font-family:'Spectral',serif; font-size:0.9rem; color:var(--ink); outline:none; transition:border-color 0.2s; }
  .field input:focus, .field select:focus { border-color:var(--gold); }
  .field input::placeholder { color:var(--slate); }
  .btn { background:var(--gold); color:white; border:none; border-radius:4px; padding:0.6rem 1.4rem; font-family:'IBM Plex Mono',monospace; font-size:0.8rem; cursor:pointer; transition:background 0.2s; letter-spacing:0.04em; }
  .btn:hover { background:var(--gold-light); }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:4px; padding:0.6rem 1.1rem; font-family:'IBM Plex Mono',monospace; font-size:0.8rem; cursor:pointer; transition:all 0.2s; margin-left:0.5rem; }
  .btn-ghost:hover { border-color:var(--gold); color:var(--gold); }
  .status-msg { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); margin-top:0.75rem; min-height:16px; }
  .status-msg.ok { color:var(--green); } .status-msg.err { color:var(--red); }

  .note-title-input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); padding:0.5rem 0; font-family:'Spectral',serif; font-size:1.15rem; color:var(--ink); outline:none; margin-bottom:0.75rem; transition:border-color 0.2s; }
  .note-title-input:focus { border-bottom-color:var(--gold); }
  .note-title-input::placeholder { color:var(--slate); font-style:italic; }

  .note-body-input { width:100%; background:transparent; border:none; font-family:'Spectral',serif; font-size:0.95rem; color:var(--ink); outline:none; resize:none; line-height:1.9; min-height:300px; }
  .note-body-input::placeholder { color:var(--slate); font-style:italic; }
  .editor-footer { display:flex; justify-content:space-between; align-items:center; margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border); }
  .word-count { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--slate); }

  .search-bar { width:100%; background:white; border:1px solid var(--border); border-radius:6px; padding:0.65rem 1rem; font-family:'Spectral',serif; font-size:0.9rem; color:var(--ink); outline:none; margin-bottom:1.25rem; transition:border-color 0.2s; }
  .search-bar:focus { border-color:var(--gold); }
  .search-bar::placeholder { color:var(--faint); font-style:italic; }

  .category-filter { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.25rem; }
  .cat-chip { background:white; border:1.5px solid var(--border); border-radius:20px; padding:0.25rem 0.75rem; font-family:'IBM Plex Mono',monospace; font-size:0.72rem; cursor:pointer; transition:all 0.2s; color:var(--muted); user-select:none; }
  .cat-chip:hover { border-color:var(--gold); color:var(--gold); }
  .cat-chip.active { background:var(--gold-faint); border-color:var(--gold); color:var(--gold); }

  .note-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.1rem 1.4rem; margin-bottom:0.75rem; cursor:pointer; transition:border-color 0.2s; }
  .note-card:hover { border-color:var(--gold); }
  .note-card-meta { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--faint); margin-bottom:0.3rem; display:flex; justify-content:space-between; }
  .note-card-title { font-family:'Spectral',serif; font-size:0.95rem; color:var(--ink); margin-bottom:0.3rem; }
  .note-card-preview { font-size:0.78rem; color:var(--muted); font-style:italic; line-height:1.5; }
  .reader-back { background:none; border:none; color:var(--gold); font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; cursor:pointer; margin-bottom:1.5rem; padding:0; text-transform:uppercase; }
  .reader-meta { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--faint); margin-bottom:0.5rem; }
  .reader-title { font-family:'Spectral',serif; font-size:1.6rem; font-weight:300; color:var(--ink); margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
  .reader-body { font-family:'Spectral',serif; font-size:0.95rem; line-height:1.9; color:var(--ink); white-space:pre-wrap; }

  .empty-state { text-align:center; padding:3rem 1rem; color:var(--faint); font-style:italic; }
  .loading-overlay { text-align:center; padding:2rem; }
  .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 0.75rem; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-style:italic; font-size:0.85rem; color:var(--muted); }

  .breadcrumb { background:var(--surface); border-top:1px solid var(--border); padding:0.75rem 1.5rem; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.08em; color:var(--faint); text-align:center; }
  .breadcrumb a { color:var(--accent); text-decoration:none; }
  .breadcrumb a:hover { text-decoration:underline; }
</style>
</head>
<body>
<a class="home-btn" href="index.html">← Home</a>
<div class="header">
  <div class="header-label">Study Notes</div>
  <h1>Commonplace</h1>
  <div class="header-sub">Concepts, notes, things worth keeping</div>
</div>
<nav class="tabs">
  <div class="tab active" onclick="showTab('write',this)">New Note</div>
  <div class="tab" onclick="showTab('notes',this)">All Notes</div>
  <div class="tab" onclick="showTab('settings',this)">Settings</div>
</nav>
<main>

  <!-- NEW NOTE -->
  <div class="panel active" id="panel-write">
    <div class="card">
      <input type="text" class="note-title-input" id="noteTitle" placeholder="Note title…">
      <div class="field">
        <label>Category</label>
        <select id="noteCategory">
          <option value="QUT">QUT Study</option>
          <option value="Digital Health">Digital Health</option>
          <option value="Clinical">Clinical</option>
          <option value="SQL">SQL</option>
          <option value="Power BI">Power BI</option>
          <option value="Philosophy">Philosophy / Taoism</option>
          <option value="General">General</option>
        </select>
      </div>
      <textarea class="note-body-input" id="noteBody" placeholder="Write your note here… markdown works great" oninput="updateNoteWordCount()"></textarea>
      <div class="editor-footer">
        <div class="word-count" id="noteWordCount">0 words</div>
        <div>
          <button class="btn-ghost" onclick="clearNote()">Clear</button>
          <button class="btn" onclick="saveNote()" id="saveNoteBtn" style="margin-left:0.5rem">Save to GitHub</button>
        </div>
      </div>
      <div class="status-msg" id="noteSaveStatus"></div>
    </div>
  </div>

  <!-- ALL NOTES -->
  <div class="panel" id="panel-notes">
    <input type="text" class="search-bar" id="searchBar" placeholder="Search notes…" oninput="filterNotes()">
    <div class="category-filter" id="catFilter"></div>
    <div id="notesContent"></div>
  </div>

  <!-- READER -->
  <div class="panel" id="panel-reader">
    <button class="reader-back" onclick="showTab('notes', document.querySelectorAll('.tab')[1])">← Back to notes</button>
    <div class="reader-meta" id="readerMeta"></div>
    <div class="reader-title" id="readerTitle"></div>
    <div class="reader-body" id="readerBody"></div>
  </div>

  <!-- SETTINGS -->
  <div class="panel" id="panel-settings">
    <div class="card">
      <div class="card-title">GitHub Connection</div>
      <div style="font-size:0.82rem;color:var(--muted);font-style:italic;margin-bottom:1.25rem;">Token stored locally in your browser only.</div>
      <div class="field"><label>GitHub Token</label><input type="password" id="ghToken" placeholder="ghp_…"></div>
      <div class="field"><label>Repo</label><input type="text" id="ghRepo" placeholder="sh4unn/shaunzen" value="sh4unn/shaunzen"></div>
      <button class="btn" onclick="saveSettings()">Save</button>
      <button class="btn-ghost" onclick="testConnection()">Test</button>
      <div class="status-msg" id="settingsStatus"></div>
    </div>
  </div>

</main>
<div class="breadcrumb"><a href="index.html">Home</a> &rsaquo; Commonplace</div>
<script>
  let allNotes = [];
  let activeCategory = 'All';

  function getConfig() {
    return { token: localStorage.getItem('gh_token') || '', repo: localStorage.getItem('gh_repo') || 'sh4unn/shaunzen' };
  }

  async function getSHA(token, repo, path) {
    try {
      const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } });
      if (r.ok) return (await r.json()).sha;
    } catch(e) {}
    return null;
  }

  async function ghSave(path, content) {
    const { token, repo } = getConfig();
    if (!token) throw new Error('No token — go to Settings first');
    const encoded = btoa(unescape(encodeURIComponent(content)));
    const sha = await getSHA(token, repo, path);
    const body = { message: `Commonplace: save ${path}`, content: encoded };
    if (sha) body.sha = sha;
    let res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { method:'PUT', headers: { Authorization:`token ${token}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' }, body: JSON.stringify(body) });
    // 409 = SHA conflict — re-fetch and retry once
    if (res.status === 409) {
      const freshSha = await getSHA(token, repo, path);
      const retryBody = { message: `Commonplace: save ${path}`, content: encoded };
      if (freshSha) retryBody.sha = freshSha;
      res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { method:'PUT', headers: { Authorization:`token ${token}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' }, body: JSON.stringify(retryBody) });
    }
    if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error('Save failed (' + res.status + ')' + (err.message ? ': ' + err.message : '')); }
  }

  async function ghLoad(path) {
    const { token, repo } = getConfig();
    if (!token) throw new Error('No token');
    const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { headers: { Authorization:`token ${token}`, Accept:'application/vnd.github.v3+json' } });
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('Load failed (' + r.status + ')');
    return decodeURIComponent(escape(atob((await r.json()).content.replace(/\n/g,''))));
  }

  function saveSettings() { localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim()); localStorage.setItem('gh_repo', document.getElementById('ghRepo').value.trim() || 'sh4unn/shaunzen'); setStatus('settingsStatus','Saved ✓','ok'); }
  async function testConnection() { setStatus('settingsStatus','Testing…',''); try { const { token, repo } = getConfig(); const r = await fetch(`https://api.github.com/repos/${repo}`, { headers: { Authorization:`token ${token}` } }); r.ok ? setStatus('settingsStatus','Connected ✓','ok') : setStatus('settingsStatus','Failed — check token','err'); } catch(e) { setStatus('settingsStatus','Error: '+e.message,'err'); } }
  function loadSettingsFields() { document.getElementById('ghToken').value = localStorage.getItem('gh_token')||''; document.getElementById('ghRepo').value = localStorage.getItem('gh_repo')||'sh4unn/shaunzen'; }

  function updateNoteWordCount() {
    const w = document.getElementById('noteBody').value.trim().split(/\s+/).filter(x=>x).length;
    document.getElementById('noteWordCount').textContent = w + ' word' + (w!==1?'s':'');
  }
  function clearNote() { document.getElementById('noteTitle').value=''; document.getElementById('noteBody').value=''; updateNoteWordCount(); }

  async function saveNote() {
    const body = document.getElementById('noteBody').value.trim();
    if (!body) { setStatus('noteSaveStatus','Nothing to save','err'); return; }
    const btn = document.getElementById('saveNoteBtn');
    btn.disabled=true; btn.textContent='Saving…';
    try {
      const now = new Date();
      const dateKey = now.toISOString().split('T')[0];
      const title = document.getElementById('noteTitle').value.trim() || 'Untitled';
      const category = document.getElementById('noteCategory').value;
      const note = { date:dateKey, title, category, body };
      let index = [];
      const ex = await ghLoad('commonplace/index.json');
      if (ex) index = JSON.parse(ex);
      const filename = `commonplace/${dateKey}-${Date.now()}.json`;
      await ghSave(filename, JSON.stringify(note,null,2));
      index.unshift({ date:dateKey, title, category, file:filename });
      await ghSave('commonplace/index.json', JSON.stringify(index,null,2));
      setStatus('noteSaveStatus','Saved to GitHub ✓','ok');
      clearNote();
    } catch(e) { setStatus('noteSaveStatus',e.message,'err'); }
    btn.disabled=false; btn.textContent='Save to GitHub';
  }

  async function loadNotes() {
    const container = document.getElementById('notesContent');
    container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><div class="loading-text">Loading notes…</div></div>';
    try {
      const raw = await ghLoad('commonplace/index.json');
      if (!raw) { container.innerHTML='<div class="empty-state">No notes yet.</div>'; return; }
      allNotes = JSON.parse(raw);
      buildCategoryFilter();
      renderNotes();
    } catch(e) { container.innerHTML='<div class="empty-state">Could not load — check settings.</div>'; }
  }

  function buildCategoryFilter() {
    const cats = ['All', ...new Set(allNotes.map(n=>n.category))];
    document.getElementById('catFilter').innerHTML = cats.map(c => `<div class="cat-chip${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${c}</div>`).join('');
  }
  function setCategory(cat) { activeCategory=cat; buildCategoryFilter(); renderNotes(); }
  function filterNotes() { renderNotes(); }

  function renderNotes() {
    const query = document.getElementById('searchBar').value.toLowerCase();
    const filtered = allNotes.filter(n => {
      const matchCat = activeCategory==='All' || n.category===activeCategory;
      const matchQ = !query || n.title.toLowerCase().includes(query) || (n.body||'').toLowerCase().includes(query);
      return matchCat && matchQ;
    });
    const container = document.getElementById('notesContent');
    if (!filtered.length) { container.innerHTML='<div class="empty-state">No matching notes.</div>'; return; }
    container.innerHTML = filtered.map(n => `
      <div class="note-card" onclick="openNote('${n.file}')">
        <div class="note-card-meta"><span>${n.date}</span><span>${n.category}</span></div>
        <div class="note-card-title">${n.title}</div>
      </div>`).join('');
  }

  async function openNote(file) {
    showTab('reader', null);
    document.getElementById('readerTitle').textContent='Loading…';
    document.getElementById('readerBody').textContent='';
    try {
      const raw = await ghLoad(file);
      if (!raw) return;
      const note = JSON.parse(raw);
      document.getElementById('readerMeta').textContent = note.date + ' · ' + note.category;
      document.getElementById('readerTitle').textContent = note.title;
      document.getElementById('readerBody').textContent = note.body;
    } catch(e) { document.getElementById('readerTitle').textContent='Error loading note'; }
  }

  function setStatus(id,msg,type) { const el=document.getElementById(id); el.textContent=msg; el.className='status-msg'+(type?' '+type:''); }

  function showTab(id, el) {
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('panel-'+id).classList.add('active');
    if(el) el.classList.add('active');
    if(id==='notes') loadNotes();
    if(id==='settings') loadSettingsFields();
  }
</script>
</body>
</html>
