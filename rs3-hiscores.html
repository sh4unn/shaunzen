<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS3 Hiscores</title>
<link href="https://fonts.googleapis.com/css2?family=New+Rocker&family=Spectral:ital,wght@0,300;0,400;1,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --slate:#bfcbce; --bg:#f0f4f5; --surface:#e4ecee; --card:#dde7ea;
    --border:#c0ced2; --ink:#1a2628; --muted:#4a6068; --faint:#8fa0a5;
    --accent:#2a5a6a; --accent-light:#3a7a8c; --accent-faint:#e0ecf0;
    --gold:#8a6a20; --gold-light:#aa8a30;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'Spectral',serif; min-height:100vh; padding-bottom:4rem; }

  .home-btn { position:fixed; top:1rem; left:1rem; z-index:100; background:var(--accent); color:white; text-decoration:none; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; padding:0.5rem 0.9rem; border-radius:2px; opacity:0.85; transition:background 0.2s; }
  .home-btn:hover { background:var(--accent-light); opacity:1; }

  .bg-layer { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .orb { position:absolute; border-radius:50%; filter:blur(120px); opacity:0.12; animation:drift 28s ease-in-out infinite alternate; }
  .orb1 { width:55vw; height:55vw; background:radial-gradient(circle,#8a6a20,transparent 70%); top:-15%; left:-15%; animation-duration:22s; }
  .orb2 { width:45vw; height:45vw; background:radial-gradient(circle,#2a5a6a,transparent 70%); bottom:-10%; right:-10%; animation-duration:30s; animation-delay:-12s; }
  @keyframes drift { 0%{transform:translate(0,0)}50%{transform:translate(3vw,-3vh)}100%{transform:translate(-2vw,2vh)} }

  header { position:relative; z-index:2; text-align:center; padding:4rem 2rem 2.5rem; border-bottom:1px solid var(--border); }
  .header-label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.35em; text-transform:uppercase; color:var(--faint); margin-bottom:0.75rem; }
  h1 { font-family:'New Rocker',cursive; font-size:clamp(2.5rem,8vw,5rem); color:var(--ink); text-shadow:0 2px 12px rgba(26,38,40,0.1); margin-bottom:0.3rem; line-height:1; }
  .header-sub { font-family:'Spectral',serif; font-style:italic; font-size:0.85rem; color:var(--faint); }

  .search-wrap { position:relative; z-index:2; max-width:500px; margin:0 auto; padding:2rem 1.5rem 0; }
  .search-row { display:flex; gap:0.5rem; }
  .search-input { flex:1; background:white; border:1px solid var(--border); border-radius:4px; padding:0.75rem 1rem; font-family:'IBM Plex Mono',monospace; font-size:0.9rem; color:var(--ink); outline:none; transition:border-color 0.2s; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--faint); }
  .search-btn { background:var(--accent); color:white; border:none; border-radius:4px; padding:0.75rem 1.5rem; font-family:'IBM Plex Mono',monospace; font-size:0.85rem; cursor:pointer; transition:background 0.2s; }
  .search-btn:hover { background:var(--accent-light); }
  .search-btn:disabled { opacity:0.4; cursor:not-allowed; }

  main { position:relative; z-index:2; max-width:900px; margin:0 auto; padding:2rem 1.5rem; }

  .player-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.5rem; margin-bottom:1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
  .player-name { font-family:'New Rocker',cursive; font-size:2rem; color:var(--ink); }
  .player-stats { display:flex; gap:1.5rem; flex-wrap:wrap; }
  .player-stat { text-align:center; }
  .player-stat-num { font-family:'IBM Plex Mono',monospace; font-size:1.3rem; color:var(--accent); }
  .player-stat-label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:var(--faint); margin-top:0.2rem; }

  .section-label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--faint); margin-bottom:1rem; }

  .skills-list { border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:1.5rem; }
  .skill-cell { background:var(--bg); padding:0.65rem 1rem; display:flex; align-items:center; gap:0.75rem; border-bottom:1px solid var(--border); transition:background 0.2s; }
  .skill-cell:last-child { border-bottom:none; }
  .skill-cell:hover { background:var(--surface); }
  .skill-icon { font-size:1rem; width:22px; text-align:center; flex-shrink:0; opacity:0.7; }
  .skill-name { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); width:130px; flex-shrink:0; }
  .skill-level { font-family:'IBM Plex Mono',monospace; font-size:1.05rem; color:var(--ink); line-height:1; width:50px; }
  .skill-level.maxed { color:var(--accent); }
  .skill-xp { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--faint); flex:1; }
  .skill-rank { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--faint); text-align:right; }

  .activities-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .activity-cell { background:var(--bg); padding:0.7rem 1rem; display:flex; justify-content:space-between; align-items:center; transition:background 0.2s; }
  .activity-cell:hover { background:var(--surface); }
  .activity-name { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.04em; color:var(--muted); }
  .activity-score { font-family:'IBM Plex Mono',monospace; font-size:0.95rem; color:var(--accent); }

  .loading { text-align:center; padding:3rem; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-style:italic; color:var(--muted); font-size:0.88rem; }

  .error-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1rem 1.25rem; font-family:'IBM Plex Mono',monospace; font-size:0.82rem; color:var(--muted); }
  .empty { text-align:center; padding:3rem; color:var(--faint); font-style:italic; }

  @media(max-width:600px) { .skills-grid{grid-template-columns:1fr 1fr;} .player-card{flex-direction:column;} }
</style>
</head>
<body>

<div class="bg-layer"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<a class="home-btn" href="index.html">← Home</a>

<header>
  <div class="header-label">RuneScape 3</div>
  <h1>Hiscores</h1>
  <div class="header-sub">Live stats from the RS3 hiscores</div>
</header>

<div class="search-wrap">
  <div class="search-row">
    <input type="text" class="search-input" id="playerInput" placeholder="Player name…" value="sh4unn" onkeydown="if(event.key==='Enter')lookup()">
    <button class="search-btn" onclick="lookup()" id="searchBtn">Look up</button>
  </div>
</div>

<main id="mainContent">
  <div class="empty">Enter a player name and hit Look up</div>
</main>

<script>
  const SKILLS = [
    {name:'Overall',icon:'⚔️'},{name:'Attack',icon:'⚔️'},{name:'Defence',icon:'🛡️'},
    {name:'Strength',icon:'💪'},{name:'Constitution',icon:'❤️'},{name:'Ranged',icon:'🏹'},
    {name:'Prayer',icon:'🙏'},{name:'Magic',icon:'🔮'},{name:'Cooking',icon:'🍳'},
    {name:'Woodcutting',icon:'🪓'},{name:'Fletching',icon:'🎯'},{name:'Fishing',icon:'🎣'},
    {name:'Firemaking',icon:'🔥'},{name:'Crafting',icon:'🪡'},{name:'Smithing',icon:'⚒️'},
    {name:'Mining',icon:'⛏️'},{name:'Herblore',icon:'🌿'},{name:'Agility',icon:'🏃'},
    {name:'Thieving',icon:'🗝️'},{name:'Slayer',icon:'💀'},{name:'Farming',icon:'🌾'},
    {name:'Runecrafting',icon:'🔵'},{name:'Hunter',icon:'🦊'},{name:'Construction',icon:'🏠'},
    {name:'Summoning',icon:'✨'},{name:'Dungeoneering',icon:'🗡️'},{name:'Divination',icon:'💎'},
    {name:'Invention',icon:'⚙️'},{name:'Archaeology',icon:'🏺'},{name:'Necromancy',icon:'💀'}
  ];

  const ACTIVITIES = [
    'Bounty Hunter','B.H. Rogues','Dominion Tower','The Crucible','Castle Wars',
    'B.A. Attackers','B.A. Defenders','B.A. Collectors','B.A. Healers','Duel Tournament',
    'Mobilising Armies','Conquest','Fist of Guthix','GG: Athletics','GG: Resource Race',
    'WE2: Armadyl Contrib','WE2: Bandos Contrib','WE2: Armadyl Kills','WE2: Bandos Kills',
    'Heist Guard','Heist Robber','CFP: 5 Game Avg','AF15: Cow Tipping','AF15: Rat Kills',
    'RuneScore','Clues: Easy','Clues: Medium','Clues: Hard','Clues: Elite','Clues: Master'
  ];

  function fmtNum(n) {
    if(n>=1e9) return (n/1e9).toFixed(1)+'b';
    if(n>=1e6) return (n/1e6).toFixed(1)+'m';
    if(n>=1e3) return (n/1e3).toFixed(1)+'k';
    return String(n);
  }
  function fmtRank(r) { return (!r||parseInt(r)<0) ? '—' : '#'+parseInt(r).toLocaleString(); }

  // Multiple CORS proxies to try in order
  const PROXIES = [
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];

  async function fetchWithProxy(rsUrl) {
    for(let i = 0; i < PROXIES.length; i++) {
      try {
        const proxyUrl = PROXIES[i](rsUrl);
        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
        if(!res.ok) continue;

        // allorigins returns JSON with .contents
        // corsproxy.io and codetabs return raw text
        let csv;
        const contentType = res.headers.get('content-type') || '';
        if(contentType.includes('application/json') || i === 0) {
          const json = await res.json();
          csv = json.contents || json;
        } else {
          csv = await res.text();
        }

        if(typeof csv !== 'string') continue;
        if(csv.trim() === '' || csv.includes('<html') || csv.includes('404')) continue;
        return csv;
      } catch(e) {
        // try next proxy
        continue;
      }
    }
    throw new Error('All proxies failed — try again in a moment');
  }

  async function lookup() {
    const name = document.getElementById('playerInput').value.trim();
    if(!name) return;
    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = '…';
    const main = document.getElementById('mainContent');
    main.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Fetching hiscores for ${name}…</div></div>`;

    try {
      const rsUrl = `https://secure.runescape.com/m=hiscore/index_lite.ws?player=${encodeURIComponent(name)}`;
      const csv = await fetchWithProxy(rsUrl);
      const lines = csv.trim().split('\n');
      const skills = [], activities = [];
      lines.forEach((line, i) => {
        const parts = line.trim().split(',');
        if(i < 30) skills.push({ rank:parts[0], level:parts[1], xp:parts[2] });
        else activities.push({ rank:parts[0], score:parts[1] });
      });
      if(skills.length === 0) throw new Error('Player not found');
      renderStats(name, skills, activities);
    } catch(e) {
      main.innerHTML = `<div class="error-box">Could not load hiscores for "${name}". ${e.message}<br><br><small style="opacity:0.6">RS3 hiscores uses a CORS proxy — occasionally these are slow or down. Try again in a moment.</small></div>`;
    }
    btn.disabled = false; btn.textContent = 'Look up';
  }

  function renderStats(name, skills, activities) {
    const main = document.getElementById('mainContent');
    const overall = skills[0] || {};
    const totalLevel = skills.slice(1).reduce((s,sk) => s+(parseInt(sk.level)||0), 0);
    const totalXp = skills.slice(1).reduce((s,sk) => s+(parseInt(sk.xp)||0), 0);

    let html = `
      <div class="player-card">
        <div class="player-name">${name}</div>
        <div class="player-stats">
          <div class="player-stat"><div class="player-stat-num">${overall.level||totalLevel||'—'}</div><div class="player-stat-label">Total Level</div></div>
          <div class="player-stat"><div class="player-stat-num">${totalXp>0?fmtNum(totalXp):'—'}</div><div class="player-stat-label">Total XP</div></div>
          <div class="player-stat"><div class="player-stat-num">${fmtRank(overall.rank)}</div><div class="player-stat-label">Overall Rank</div></div>
        </div>
      </div>
      <div class="section-label">— Skills</div>
      <div class="skills-list">`;

    skills.slice(1).forEach((sk, i) => {
      const skill = SKILLS[i+1] || { name:'Skill '+(i+1), icon:'⚡' };
      const level = parseInt(sk.level) || 0;
      const trueMax = (skill.name==='Dungeoneering'||skill.name==='Invention') ? 120 : 99;
      html += `
        <div class="skill-cell">
          <div class="skill-icon">${skill.icon}</div>
          <div class="skill-name">${skill.name}</div>
          <div class="skill-level${level>=trueMax?' maxed':''}">${level||'—'}</div>
          <div class="skill-xp">${sk.xp&&parseInt(sk.xp)>0?fmtNum(parseInt(sk.xp))+' xp':''}</div>
          <div class="skill-rank">${fmtRank(sk.rank)}</div>
        </div>`;
    });
    html += '</div>';

    const activeActs = activities.filter(a => parseInt(a.score) > 0);
    if(activeActs.length) {
      html += `<div class="section-label" style="margin-top:1.5rem">— Activities & Minigames</div><div class="activities-grid">`;
      activities.forEach((act, i) => {
        const score = parseInt(act.score);
        if(score <= 0) return;
        html += `<div class="activity-cell"><div class="activity-name">${ACTIVITIES[i]||'Activity '+(i+1)}</div><div class="activity-score">${score.toLocaleString()}</div></div>`;
      });
      html += '</div>';
    }

    main.innerHTML = html;
  }

  window.addEventListener('load', () => lookup());
</script>
</body>
</html>
