<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2a5a6a">
<title>Pomodoro — Shaunzen</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=New+Rocker&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f4f5; --surface:#e4ecee; --surface2:#dde7ea;
    --border:#c0ced2; --slate:#bfcbce;
    --ink:#1a2628; --muted:#4a6068; --faint:#8fa0a5;
    --accent:#2a5a6a; --accent-light:#3a7a8c; --accent-faint:#e0ecf0;
    --warm:#c45e2a; --warm-faint:#f5ede8;
    --green:#3a6a2a; --green-faint:#e8f4e8;
    --gold:#8a6a20; --gold-faint:#f5f0e0;

    /* session colours */
    --col-focus: #2a5a6a;
    --col-break: #3a6a2a;
    --col-long:  #5a3a7a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'Spectral',serif; min-height:100vh; display:flex; flex-direction:column; }

  .home-btn { position:fixed; top:1rem; left:1rem; z-index:100; background:var(--accent); color:white; text-decoration:none; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; padding:0.5rem 0.9rem; border-radius:2px; transition:background 0.2s; }
  .home-btn:hover { background:var(--accent-light); }

  /* HEADER */
  .header { background:var(--accent); color:white; padding:2.5rem 2rem 2rem; text-align:center; position:relative; overflow:hidden; transition:background 0.6s; }
  .header::before { content:'⏱'; position:absolute; right:-1rem; top:-1rem; font-size:9rem; opacity:0.06; pointer-events:none; }
  .header-label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:0.6rem; }
  .header h1 { font-family:'New Rocker',cursive; font-size:clamp(2rem,6vw,3rem); margin-bottom:0.3rem; }
  .header-sub { font-size:0.82rem; color:rgba(255,255,255,0.5); font-style:italic; }

  /* SESSION TABS */
  .session-tabs { background:rgba(0,0,0,0.15); display:flex; transition:background 0.6s; }
  .stab { flex:1; padding:0.65rem; font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.4); cursor:pointer; text-align:center; border-bottom:2px solid transparent; transition:color 0.2s,border-color 0.2s; user-select:none; }
  .stab.active { color:white; border-bottom-color:white; }
  .stab:hover { color:rgba(255,255,255,0.75); }

  /* MAIN */
  main { flex:1; max-width:560px; margin:0 auto; padding:2.5rem 1.5rem; width:100%; }

  /* RING */
  .ring-wrap { display:flex; justify-content:center; margin-bottom:2rem; }
  .ring-container { position:relative; width:260px; height:260px; }
  .ring-svg { width:260px; height:260px; transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:var(--surface2); stroke-width:10; }
  .ring-progress { fill:none; stroke:var(--accent); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke 0.6s; }
  .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .timer-display { font-family:'IBM Plex Mono',monospace; font-size:3.2rem; font-weight:300; color:var(--ink); letter-spacing:0.04em; line-height:1; }
  .session-label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--faint); margin-top:0.4rem; }

  /* CONTROLS */
  .controls { display:flex; gap:0.75rem; justify-content:center; margin-bottom:2rem; }
  .ctrl-btn { background:var(--accent); color:white; border:none; border-radius:4px; padding:0.75rem 2rem; font-family:'IBM Plex Mono',monospace; font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:background 0.2s; }
  .ctrl-btn:hover { background:var(--accent-light); }
  .ctrl-btn.ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .ctrl-btn.ghost:hover { border-color:var(--accent); color:var(--accent); }

  /* POMODORO DOTS */
  .pomo-track { display:flex; justify-content:center; gap:0.6rem; margin-bottom:2.5rem; }
  .pomo-dot { width:10px; height:10px; border-radius:50%; background:var(--border); transition:background 0.3s; }
  .pomo-dot.done { background:var(--accent); }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.75rem; margin-bottom:2rem; }
  .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:0.9rem 0.75rem; text-align:center; }
  .stat-val { font-family:'IBM Plex Mono',monospace; font-size:1.4rem; color:var(--ink); }
  .stat-label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); margin-top:0.2rem; }

  /* SETTINGS */
  .settings-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.25rem 1.5rem; }
  .settings-title { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--faint); margin-bottom:1rem; }
  .settings-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.75rem; margin-bottom:1rem; }
  .sfield label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--faint); display:block; margin-bottom:0.3rem; }
  .sfield input { width:100%; background:white; border:1px solid var(--border); border-radius:4px; padding:0.5rem 0.75rem; font-family:'IBM Plex Mono',monospace; font-size:1rem; color:var(--ink); text-align:center; outline:none; transition:border-color 0.2s; }
  .sfield input:focus { border-color:var(--accent); }
  .settings-row { display:flex; gap:0.5rem; align-items:center; }
  .small-btn { background:var(--accent); color:white; border:none; border-radius:4px; padding:0.5rem 1rem; font-family:'IBM Plex Mono',monospace; font-size:0.75rem; letter-spacing:0.06em; cursor:pointer; transition:background 0.2s; }
  .small-btn:hover { background:var(--accent-light); }
  .small-btn.ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .small-btn.ghost:hover { border-color:var(--accent); color:var(--accent); }

  /* SOUND TOGGLE */
  .sound-row { display:flex; align-items:center; gap:0.75rem; margin-top:0.75rem; }
  .sound-label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
  .toggle { position:relative; width:38px; height:22px; cursor:pointer; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-track { position:absolute; inset:0; background:var(--border); border-radius:20px; transition:background 0.2s; }
  .toggle input:checked + .toggle-track { background:var(--accent); }
  .toggle-thumb { position:absolute; top:3px; left:3px; width:16px; height:16px; background:white; border-radius:50%; transition:transform 0.2s; }
  .toggle input:checked ~ .toggle-thumb { transform:translateX(16px); }

  /* SESSION COLOURS on header */
  body.mode-break .header { background:var(--green); }
  body.mode-break .ring-progress { stroke:var(--green); }
  body.mode-break .ctrl-btn:not(.ghost) { background:var(--green); }
  body.mode-break .ctrl-btn:not(.ghost):hover { background:#4a7a3a; }
  body.mode-break .pomo-dot.done { background:var(--green); }
  body.mode-break .sfield input:focus { border-color:var(--green); }
  body.mode-long .header { background:var(--col-long); }
  body.mode-long .ring-progress { stroke:var(--col-long); }
  body.mode-long .ctrl-btn:not(.ghost) { background:var(--col-long); }
  body.mode-long .ctrl-btn:not(.ghost):hover { background:#6a4a8a; }
  body.mode-long .pomo-dot.done { background:var(--col-long); }

  /* notification flash */
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .ring-container.flash { animation:flash 0.4s ease 3; }

  @media(max-width:480px) {
    .ring-container { width:220px; height:220px; }
    .ring-svg { width:220px; height:220px; }
    .timer-display { font-size:2.6rem; }
    .settings-grid { grid-template-columns:1fr 1fr; }
  }
  .site-mark { font-family:'New Rocker',cursive; font-size:1.6rem; color:var(--accent); display:inline-block; width:2.4rem; height:2.4rem; line-height:2.4rem; border:1.5px solid var(--border); border-radius:50%; text-align:center; margin-bottom:0.8rem; }
</style>
</head>
<body>
<a class="home-btn" href="index.html">← Home</a>

<div class="header" id="header">
  <div class="header-label">Focus Tool</div>
  <h1>Pomodoro</h1>
  <div class="header-sub" id="headerSub">25 min focus · 5 min break</div>
</div>
<div class="session-tabs" id="sessionTabs">
  <div class="stab active" id="stab-focus" onclick="switchMode('focus')">Focus</div>
  <div class="stab" id="stab-break" onclick="switchMode('break')">Short Break</div>
  <div class="stab" id="stab-long" onclick="switchMode('long')">Long Break</div>
</div>

<main>

  <!-- RING TIMER -->
  <div class="ring-wrap">
    <div class="ring-container" id="ringContainer">
      <svg class="ring-svg" viewBox="0 0 260 260">
        <circle class="ring-bg" cx="130" cy="130" r="115"/>
        <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="115"
          stroke-dasharray="722.57" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="session-label" id="sessionLabel">Focus</div>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="ctrl-btn ghost" onclick="resetTimer()">Reset</button>
    <button class="ctrl-btn ghost" onclick="skipSession()">Skip</button>
  </div>

  <!-- POMODORO DOTS -->
  <div class="pomo-track" id="pomoDots"></div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="statPomos">0</div>
      <div class="stat-label">Pomodoros</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statFocusMin">0</div>
      <div class="stat-label">Focus min</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statStreak">0</div>
      <div class="stat-label">Best streak</div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="settings-card">
    <div class="settings-title">— Settings</div>
    <div class="settings-grid">
      <div class="sfield">
        <label>Focus (min)</label>
        <input type="number" id="setFocus" value="25" min="1" max="90">
      </div>
      <div class="sfield">
        <label>Short break</label>
        <input type="number" id="setBreak" value="5" min="1" max="30">
      </div>
      <div class="sfield">
        <label>Long break</label>
        <input type="number" id="setLong" value="15" min="1" max="60">
      </div>
    </div>
    <div class="settings-row">
      <button class="small-btn" onclick="applySettings()">Apply</button>
      <button class="small-btn ghost" onclick="resetStats()">Reset stats</button>
    </div>
    <div class="sound-row">
      <div class="sound-label">Sound</div>
      <label class="toggle">
        <input type="checkbox" id="soundToggle" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

</main>

<div style="background:var(--surface);border-top:1px solid var(--border);padding:0.75rem 1.5rem;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--faint);text-align:center;">
  <a href="index.html" style="color:var(--accent);text-decoration:none;">Home</a> &rsaquo; Pomodoro
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────
  const CIRC = 2 * Math.PI * 115; // 722.57

  let durations = { focus: 25, break: 5, long: 15 };
  let mode       = 'focus';   // focus | break | long
  let running    = false;
  let remaining  = durations.focus * 60;
  let total      = durations.focus * 60;
  let interval   = null;
  let pomosThisSet = 0;   // count toward long break (resets at 4)
  let pomosTotal   = 0;
  let focusMinutes = 0;
  let streak       = 0;
  let bestStreak   = 0;

  // Load persisted stats
  (function loadStats() {
    const s = JSON.parse(localStorage.getItem('pomo_stats') || '{}');
    pomosTotal   = s.pomosTotal   || 0;
    focusMinutes = s.focusMinutes || 0;
    bestStreak   = s.bestStreak   || 0;
    durations    = s.durations    || { focus:25, break:5, long:15 };
    document.getElementById('setFocus').value = durations.focus;
    document.getElementById('setBreak').value = durations.break;
    document.getElementById('setLong').value  = durations.long;
    const soundPref = localStorage.getItem('pomo_sound');
    if (soundPref === 'off') document.getElementById('soundToggle').checked = false;
    updateStatsDisplay();
  })();

  function saveStats() {
    localStorage.setItem('pomo_stats', JSON.stringify({
      pomosTotal, focusMinutes, bestStreak, durations
    }));
  }

  // ── Audio ──────────────────────────────────────────────────────────────
  function playBell(type) {
    if (!document.getElementById('soundToggle').checked) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const freqs = type === 'done' ? [880, 1100, 1320] : [660, 880];
      freqs.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = f;
        const t = ctx.currentTime + i * 0.18;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.start(t); osc.stop(t + 0.55);
      });
    } catch(e) {}
  }

  document.getElementById('soundToggle').addEventListener('change', function() {
    localStorage.setItem('pomo_sound', this.checked ? 'on' : 'off');
  });

  // ── Ring ───────────────────────────────────────────────────────────────
  function updateRing() {
    const pct     = remaining / total;
    const offset  = CIRC * (1 - pct);
    document.getElementById('ringProgress').style.strokeDashoffset = offset;
  }

  function updateDisplay() {
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    document.getElementById('timerDisplay').textContent = m + ':' + s;
    document.title = running ? m + ':' + s + ' — Pomodoro' : 'Pomodoro — Shaunzen';
    updateRing();
  }

  // ── Mode switching ─────────────────────────────────────────────────────
  const modeConfig = {
    focus: { label:'Focus',       bodyClass:'',          subText: () => `${durations.focus} min focus · ${durations.break} min break` },
    break: { label:'Short Break', bodyClass:'mode-break', subText: () => `Take a breather — ${durations.break} min` },
    long:  { label:'Long Break',  bodyClass:'mode-long',  subText: () => `Long break — ${durations.long} min. Well earned.` },
  };

  function switchMode(m, auto = false) {
    if (running && !auto) { resetTimer(); }
    mode = m;
    total     = durations[m === 'focus' ? 'focus' : m === 'break' ? 'break' : 'long'] * 60;
    remaining = total;

    document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
    document.getElementById('stab-' + m).classList.add('active');
    document.body.className = modeConfig[m].bodyClass;
    document.getElementById('sessionLabel').textContent = modeConfig[m].label;
    document.getElementById('headerSub').textContent = modeConfig[m].subText();

    updateDisplay();
    if (auto) startTimer();
  }

  // ── Timer ──────────────────────────────────────────────────────────────
  function toggleTimer() {
    running ? pauseTimer() : startTimer();
  }

  function startTimer() {
    running = true;
    document.getElementById('startBtn').textContent = 'Pause';
    interval = setInterval(tick, 1000);
  }

  function pauseTimer() {
    running = false;
    clearInterval(interval);
    document.getElementById('startBtn').textContent = 'Resume';
  }

  function resetTimer() {
    pauseTimer();
    remaining = total;
    document.getElementById('startBtn').textContent = 'Start';
    updateDisplay();
  }

  function skipSession() {
    pauseTimer();
    remaining = 0;
    tick(true);
  }

  function tick(forced = false) {
    if (!forced) remaining--;
    updateDisplay();

    if (remaining <= 0) {
      clearInterval(interval);
      running = false;
      onSessionEnd();
    }
  }

  function onSessionEnd() {
    playBell('done');
    document.getElementById('ringContainer').classList.add('flash');
    setTimeout(() => document.getElementById('ringContainer').classList.remove('flash'), 1500);

    // Notify if tab is hidden
    if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
      new Notification('Pomodoro', {
        body: mode === 'focus' ? 'Focus session done — take a break!' : 'Break over — back to work!',
        icon: ''
      });
    }

    if (mode === 'focus') {
      pomosThisSet++;
      pomosTotal++;
      focusMinutes += durations.focus;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      updateStatsDisplay();
      saveStats();
      renderDots();
      if (pomosThisSet >= 4) {
        pomosThisSet = 0;
        setTimeout(() => switchMode('long', true), 800);
      } else {
        setTimeout(() => switchMode('break', true), 800);
      }
    } else {
      setTimeout(() => switchMode('focus', true), 800);
    }
  }

  // ── Stats ──────────────────────────────────────────────────────────────
  function updateStatsDisplay() {
    document.getElementById('statPomos').textContent    = pomosTotal;
    document.getElementById('statFocusMin').textContent = focusMinutes;
    document.getElementById('statStreak').textContent   = bestStreak;
  }

  function resetStats() {
    if (!confirm('Reset all stats?')) return;
    pomosTotal = 0; focusMinutes = 0; bestStreak = 0; streak = 0; pomosThisSet = 0;
    updateStatsDisplay(); renderDots(); saveStats();
  }

  // ── Dot track ──────────────────────────────────────────────────────────
  function renderDots() {
    const wrap = document.getElementById('pomoDots');
    wrap.innerHTML = Array.from({length:4}, (_,i) =>
      `<div class="pomo-dot${i < pomosThisSet ? ' done' : ''}"></div>`
    ).join('');
  }

  // ── Settings ───────────────────────────────────────────────────────────
  function applySettings() {
    const f = parseInt(document.getElementById('setFocus').value) || 25;
    const b = parseInt(document.getElementById('setBreak').value) || 5;
    const l = parseInt(document.getElementById('setLong').value)  || 15;
    durations = { focus: Math.min(Math.max(f,1),90), break: Math.min(Math.max(b,1),30), long: Math.min(Math.max(l,1),60) };
    saveStats();
    resetTimer();
    switchMode(mode);
  }

  // ── Notification permission ────────────────────────────────────────────
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // ── Init ───────────────────────────────────────────────────────────────
  switchMode('focus');
  renderDots();
</script>
</body>
</html>
